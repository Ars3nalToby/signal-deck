name: Daily refresh

on:
  schedule:
    # 07:00 Australia/Brisbane (UTC+10, no DST) = 21:00 UTC the previous day
    - cron: '0 21 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update build stamp
        run: |
          STAMP="$(TZ=Australia/Brisbane date '+%-d %b %Y · %H:%M AEST')"
          sed -i -E "s#<!--BUILD_DATE-->.*<!--/BUILD_DATE-->#<!--BUILD_DATE-->${STAMP}<!--/BUILD_DATE-->#" index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: daily refresh $(TZ=Australia/Brisbane date '+%Y-%m-%d')"
          git push
