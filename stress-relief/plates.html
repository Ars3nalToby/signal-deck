<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smash the Plates — Unwind</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;1,500&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  body{display:flex; flex-direction:column; align-items:center;}
  .stage{height: 68vh; min-height: 460px; max-height: 640px; cursor: grab;}
  .stage.grabbing{cursor: grabbing;}
  .controls{display:flex; gap:12px; justify-content:center; margin-top:18px;}
  .btn{
    background: var(--bg-2); border:1px solid var(--line); color: var(--ink);
    font-family: var(--sans); font-weight:700; font-size:13px;
    padding: 10px 20px; border-radius: 30px; cursor:pointer;
    transition: all .18s ease;
  }
  .btn:hover{border-color: #f2a2b0; color:#f2a2b0; transform: translateY(-1px);}
  .btn.primary{background: linear-gradient(135deg,#f2a2b0,#f2b8a2); color:#2a1216; border:none;}
  .btn.primary:hover{transform: translateY(-1px) scale(1.03); color:#2a1216;}
</style>
</head>
<body>
<div class="topbar">
  <a class="back" href="index.html">&larr; Back to Unwind</a>
  <div class="title">Smash the Plates</div>
  <div class="right">
    <span id="streak-label" class="progress-wrap">streak: 0</span>
    <button class="mute-toggle" id="mute-btn">🔊</button>
  </div>
</div>

<div class="counter-row">
  <div class="stat"><div class="num" id="smashed-count">0</div><div class="lbl">Smashed</div></div>
  <div class="stat"><div class="num" id="best-streak">0</div><div class="lbl">Best Streak</div></div>
</div>

<div class="stage" id="stage">
  <canvas id="c"></canvas>
  <div class="celebrate" id="celebrate">
    <h2>Feeling lighter?</h2>
    <p id="celebrate-msg">50 plates down. The kitchen forgives you.</p>
    <button id="celebrate-close">Keep smashing</button>
  </div>
</div>

<div class="controls">
  <button class="btn primary" id="throw-btn">Throw a Plate</button>
  <button class="btn" id="rain-btn">Rain of Plates</button>
</div>
<p class="hint">Grab a plate and fling it at the wall — or just click one to shatter it.</p>

<script src="shared.js"></script>
<script>
const stageEl = document.getElementById('stage');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR;

Unwind.wireMuteButton(document.getElementById('mute-btn'));

function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = stageEl.clientWidth; H = stageEl.clientHeight;
  canvas.width = W*DPR; canvas.height = H*DPR;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  buildBrickPattern();
}
window.addEventListener('resize', resize);

// ---------- brick wall backdrop (drawn once to an offscreen tile) ----------
let brickPattern;
function buildBrickPattern(){
  const tile = document.createElement('canvas');
  const tw = 90, th = 40;
  tile.width = tw; tile.height = th;
  const tctx = tile.getContext('2d');
  tctx.fillStyle = '#241b1a';
  tctx.fillRect(0,0,tw,th);
  tctx.fillStyle = '#3a2a26';
  tctx.fillRect(1,1,tw/2-2,th/2-2);
  tctx.fillRect(tw/2+1,1,tw/2-2,th/2-2);
  tctx.fillRect(-tw/4+1,th/2+1,tw/2-2,th/2-2);
  tctx.fillRect(tw/4+1,th/2+1,tw/2-2,th/2-2);
  tctx.fillRect(tw*3/4+1,th/2+1,tw/2-2,th/2-2);
  brickPattern = ctx.createPattern(tile, 'repeat');
}

// ---------- audio: synthesized crash ----------
let actx;
function crashSound(intensity){
  if(Unwind.isMuted()) return;
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const dur = 0.35;
    const bufferSize = actx.sampleRate * dur;
    const buffer = actx.createBuffer(1, bufferSize, actx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++){
      data[i] = (Math.random()*2-1) * Math.pow(1 - i/bufferSize, 2.2);
    }
    const noise = actx.createBufferSource();
    noise.buffer = buffer;
    const bp = actx.createBiquadFilter();
    bp.type = 'highpass';
    bp.frequency.value = 1400 + Math.random()*800;
    const gain = actx.createGain();
    gain.gain.value = 0.35 + Math.min(intensity||0.5, 1)*0.35;
    noise.connect(bp).connect(gain).connect(actx.destination);
    noise.start();
    for(let k=0;k<3;k++){
      const osc = actx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = 1800 + Math.random()*2600;
      const og = actx.createGain();
      og.gain.value = 0.05;
      og.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.2 + Math.random()*0.15);
      osc.connect(og).connect(actx.destination);
      osc.start(actx.currentTime + k*0.02);
      osc.stop(actx.currentTime + 0.4);
    }
  }catch(e){}
}

// ---------- state ----------
let plates = [];
let shards = [];
let smashed = 0, streak = 0, bestStreak = 0;
let shakeT = 0, flashT = 0;
let nextCelebrateAt = 25;
let grabbed = null;

const plateColors = [
  {base:'#f4efe6', rim:'#d8cdb8'},
  {base:'#e7f1f2', rim:'#bcd6d8'},
  {base:'#f2e9ee', rim:'#d9c2cf'},
  {base:'#eef2e0', rim:'#c9d1a8'},
];

function spawnPlate(x){
  const r = 34 + Math.random()*20;
  plates.push({
    x: x!=null ? x : (60 + Math.random()*(W-120)),
    y: -r-10,
    r,
    vy: 1.6 + Math.random()*1.6,
    vx: (Math.random()-0.5)*0.6,
    rot: Math.random()*Math.PI,
    vrot: (Math.random()-0.5)*0.04,
    color: plateColors[Math.floor(Math.random()*plateColors.length)],
  });
}

function drawPlate(p){
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rot);
  const g = ctx.createRadialGradient(0,0,p.r*0.15,0,0,p.r);
  g.addColorStop(0, '#ffffff');
  g.addColorStop(0.55, p.color.base);
  g.addColorStop(1, p.color.rim);
  ctx.beginPath();
  ctx.arc(0,0,p.r,0,Math.PI*2);
  ctx.fillStyle = g;
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(0,0,0,0.12)';
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0,0,p.r*0.6,0,Math.PI*2);
  ctx.strokeStyle = 'rgba(0,0,0,0.08)';
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(-p.r*0.3,-p.r*0.35, p.r*0.28, p.r*0.14, -0.6, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fill();
  ctx.restore();
}

function shatter(p, flingVx, flingVy){
  flingVx = flingVx || 0; flingVy = flingVy || 0;
  const speed = Math.hypot(flingVx, flingVy);
  const intensity = Unwind.clamp(0.4 + speed*0.06, 0.4, 1.6);
  const n = Math.round(10 + Math.random()*8 + intensity*4);
  const cx = p.x, cy = p.y;
  for(let i=0;i<n;i++){
    const a0 = (i/n)*Math.PI*2 + Math.random()*0.3;
    const a1 = a0 + (Math.PI*2/n) + Math.random()*0.2;
    const baseSpeed = 2.5 + Math.random()*6.5*intensity;
    const dir = a0 + (a1-a0)/2;
    shards.push({
      cx, cy, r: p.r, a0, a1,
      x: 0, y: 0,
      vx: Math.cos(dir)*baseSpeed + flingVx*0.35,
      vy: Math.sin(dir)*baseSpeed - 2 + flingVy*0.35,
      rot: 0, vrot: (Math.random()-0.5)*0.5*intensity,
      color: p.color, life: 1,
      decay: 0.011 + Math.random()*0.01
    });
  }
  flashT = Math.min(1, 0.6 + intensity*0.3);
  shakeT = Math.min(1.4, 0.5 + intensity*0.5);
  smashed++; streak++;
  if(streak > bestStreak) bestStreak = streak;
  const smashedEl = document.getElementById('smashed-count');
  const bestEl = document.getElementById('best-streak');
  smashedEl.textContent = smashed; Unwind.pop(smashedEl);
  bestEl.textContent = bestStreak; Unwind.pop(bestEl);
  document.getElementById('streak-label').textContent = 'streak: ' + streak;
  stageEl.classList.add('impact');
  setTimeout(()=>stageEl.classList.remove('impact'), 150);
  crashSound(intensity);
  if(smashed >= nextCelebrateAt){
    showCelebrate();
    nextCelebrateAt += 25 + Math.floor(Math.random()*25);
  }
}

function showCelebrate(){
  const el = document.getElementById('celebrate');
  document.getElementById('celebrate-msg').textContent =
    smashed + ' plates down. The kitchen forgives you.';
  el.classList.add('show');
  Unwind.confetti(stageEl, {colors:['#f2a2b0','#f2b8a2','#eef2e0','#e7f1f2']});
}
document.getElementById('celebrate-close').onclick = ()=>{
  document.getElementById('celebrate').classList.remove('show');
};

function drawShard(s){
  ctx.save();
  ctx.translate(s.cx + s.x, s.cy + s.y);
  ctx.rotate(s.rot);
  ctx.globalAlpha = Math.max(s.life, 0);
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.arc(0,0,s.r, s.a0, s.a1);
  ctx.closePath();
  const g = ctx.createLinearGradient(0,-s.r,0,s.r);
  g.addColorStop(0,'#ffffff');
  g.addColorStop(1, s.color.rim);
  ctx.fillStyle = g;
  ctx.fill();
  ctx.lineWidth = 1;
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.stroke();
  ctx.restore();
  ctx.globalAlpha = 1;
}

function plateAt(mx,my){
  for(let i=plates.length-1;i>=0;i--){
    const p = plates[i];
    const dx = mx-p.x, dy = my-p.y;
    if(dx*dx+dy*dy <= p.r*p.r) return i;
  }
  return -1;
}

// ---------- pointer interaction: tap to shatter, drag to fling ----------
const history = [];
function pos(e){
  const rect = canvas.getBoundingClientRect();
  return {x: e.clientX-rect.left, y: e.clientY-rect.top, t: performance.now()};
}

canvas.addEventListener('pointerdown', (e)=>{
  const p = pos(e);
  const idx = plateAt(p.x, p.y);
  if(idx === -1){
    streak = 0;
    document.getElementById('streak-label').textContent = 'streak: 0';
    return;
  }
  grabbed = plates.splice(idx,1)[0];
  grabbed.x = p.x; grabbed.y = p.y;
  history.length = 0;
  history.push(p);
  stageEl.classList.add('grabbing');
  canvas.setPointerCapture(e.pointerId);
});

canvas.addEventListener('pointermove', (e)=>{
  if(!grabbed) return;
  const p = pos(e);
  grabbed.x = p.x; grabbed.y = p.y;
  history.push(p);
  if(history.length > 6) history.shift();
});

function releaseVelocity(){
  if(history.length < 2) return {vx:0, vy:0};
  const a = history[0], b = history[history.length-1];
  const dt = Math.max(b.t - a.t, 1);
  return { vx: (b.x-a.x)/dt*16, vy: (b.y-a.y)/dt*16 };
}

canvas.addEventListener('pointerup', ()=>{
  if(!grabbed) return;
  const v = releaseVelocity();
  shatter(grabbed, v.vx, v.vy);
  grabbed = null;
  stageEl.classList.remove('grabbing');
});
canvas.addEventListener('pointercancel', ()=>{ grabbed = null; stageEl.classList.remove('grabbing'); });

document.getElementById('throw-btn').onclick = ()=> spawnPlate();
document.getElementById('rain-btn').onclick = ()=>{
  for(let i=0;i<8;i++) setTimeout(()=>spawnPlate(), i*90);
};

setInterval(()=>{ if(plates.length < 4 && !grabbed) spawnPlate(); }, 1400);
for(let i=0;i<2;i++) spawnPlate();

// ---------- main loop (delta-time based) ----------
let lastTime = performance.now();
function loop(now){
  const dt = Unwind.clamp((now-lastTime)/16.67, 0, 3);
  lastTime = now;

  ctx.save();
  if(shakeT > 0){
    const mag = shakeT*6;
    ctx.translate((Math.random()-0.5)*mag, (Math.random()-0.5)*mag);
    shakeT *= Math.pow(0.85, dt);
    if(shakeT < 0.01) shakeT = 0;
  }
  ctx.clearRect(-20,-20,W+40,H+40);
  if(brickPattern){
    ctx.fillStyle = brickPattern;
    ctx.fillRect(-20,-20,W+40,H+40);
    ctx.fillStyle = 'rgba(13,17,23,0.45)';
    ctx.fillRect(-20,-20,W+40,H+40);
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.beginPath(); ctx.moveTo(0,H-24); ctx.lineTo(W,H-24); ctx.stroke();

  for(let i=plates.length-1;i>=0;i--){
    const p = plates[i];
    p.y += p.vy*dt; p.x += p.vx*dt; p.rot += p.vrot*dt;
    if(p.y - p.r > H+30){ plates.splice(i,1); continue; }
    drawPlate(p);
  }
  if(grabbed) drawPlate(grabbed);

  for(let i=shards.length-1;i>=0;i--){
    const s = shards[i];
    s.vy += 0.28*dt;
    s.x += s.vx*dt; s.y += s.vy*dt; s.rot += s.vrot*dt;
    s.life -= s.decay*dt;
    if(s.life <= 0){ shards.splice(i,1); continue; }
    drawShard(s);
  }

  if(flashT > 0){
    ctx.fillStyle = 'rgba(255,255,255,'+(flashT*0.18)+')';
    ctx.fillRect(-20,-20,W+40,H+40);
    flashT *= Math.pow(0.8, dt);
    if(flashT < 0.01) flashT = 0;
  }

  ctx.restore();
  requestAnimationFrame(loop);
}
resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
