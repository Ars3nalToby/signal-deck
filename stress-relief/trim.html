<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trim the Edges — Unwind</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✂️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;1,500&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  body{display:flex; flex-direction:column; align-items:center;}
  .stage{height: 66vh; min-height: 440px; max-height: 600px; cursor:none;}
  .controls{display:flex; gap:12px; justify-content:center; margin-top:18px;}
  .btn{
    background: var(--bg-2); border:1px solid var(--line); color: var(--ink);
    font-family: var(--sans); font-weight:700; font-size:13px;
    padding: 10px 20px; border-radius: 30px; cursor:pointer;
    transition: all .18s ease;
  }
  .btn:hover{border-color: #a8d96a; color:#a8d96a; transform: translateY(-1px);}
  .btn.primary{background: linear-gradient(135deg,#a8d96a,#6ee7d8); color:#15230a; border:none;}
  .btn.primary:hover{transform: translateY(-1px) scale(1.03); color:#15230a;}
</style>
</head>
<body>
<div class="topbar">
  <a class="back" href="index.html">&larr; Back to Unwind</a>
  <div class="title">Trim the Edges</div>
  <div class="right">
    <div class="progress-wrap">
      <span id="pct-label">0% trimmed</span>
      <div class="progress-bar"><div class="progress-fill" id="pct-fill"></div></div>
    </div>
    <button class="mute-toggle" id="mute-btn">🔊</button>
  </div>
</div>

<div class="counter-row">
  <div class="stat"><div class="num" id="edges-count">0</div><div class="lbl">Edges Finished</div></div>
</div>

<div class="stage" id="stage">
  <canvas id="c"></canvas>
  <div class="celebrate" id="celebrate">
    <h2>Crisp edge.</h2>
    <p>That fence line is immaculate. Overgrowth incoming?</p>
    <button id="next-btn">Next Overgrown Edge</button>
  </div>
</div>

<div class="controls">
  <button class="btn primary" id="regrow-btn">Let It Overgrow</button>
</div>
<p class="hint">Hold to rev the trimmer, then sweep along the fence line. Low, steady passes give the cleanest cut.</p>

<script src="shared.js"></script>
<script>
const stageEl = document.getElementById('stage');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR;

Unwind.wireMuteButton(document.getElementById('mute-btn'));

let blades = [];         // individual grass blades
let clippings = [];      // cut fragments flying
let dust = [];           // dust puffs when line hits soil
let mouseX = -200, mouseY = -200;
let trimming = false;    // pointer held down = engine revved + cutting
let headX = -200, headY = -200;      // smoothed trimmer head position
let swayT = 0;
let edgesDone = 0;
let celebrated = false;
const CUT_TARGET = 14;   // blade height considered "trimmed"
const CUT_RADIUS = 34;   // trimmer line reach

function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = stageEl.clientWidth; H = stageEl.clientHeight;
  canvas.width = W*DPR; canvas.height = H*DPR;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  plantGrass();
}

// ---------- world ----------
function groundY(){ return H*0.62; }

function plantGrass(){
  blades = [];
  const gy = groundY();
  const bandH = H - gy;             // grass grows on the strip below the fence line
  const count = Math.floor(W * 3.2); // dense: ~3 blades per px column
  for(let i=0;i<count;i++){
    const x = Math.random()*W;
    const y = gy + Math.pow(Math.random(), 0.8)*bandH*0.92 + 6;
    const depth = (y - gy)/bandH;   // 0 = back near fence, 1 = front
    const maxH = 34 + Math.random()*46 + depth*18;
    const green = 96 + Math.random()*70 - depth*22;
    blades.push({
      x, y, depth,
      h: maxH,                       // current height
      maxH,
      w: 1.1 + depth*1.5 + Math.random()*0.7,
      lean: (Math.random()-0.5)*0.5,
      phase: Math.random()*Math.PI*2,
      swayAmt: 0.06 + Math.random()*0.10,
      r: 38 + Math.random()*30 - depth*10,
      g: green,
      bcol: 34 + Math.random()*26,
      cut: false
    });
  }
  // painter's order: back blades first
  blades.sort((a,b)=>a.y-b.y);
  celebrated = false;
  updatePct();
}

function updatePct(){
  let cut = 0;
  for(const b of blades) if(b.h <= CUT_TARGET+2) cut++;
  const pct = blades.length ? Math.round(cut/blades.length*100) : 0;
  document.getElementById('pct-label').textContent = pct+'% trimmed';
  document.getElementById('pct-fill').style.width = pct+'%';
  if(pct >= 93 && !celebrated){
    celebrated = true;
    stopEngine();
    document.getElementById('celebrate').classList.add('show');
    Unwind.confetti(stageEl, {colors:['#a8d96a','#6ee7d8','#dff2b0','#4a7a2c']});
  }
  return pct;
}

// ---------- audio: 2-stroke trimmer engine ----------
let actx, engNodes = null, idleTimer = null;
function ensureAudio(){
  if(Unwind.isMuted()) return null;
  try{ actx = actx || new (window.AudioContext||window.webkitAudioContext)(); return actx; }
  catch(e){ return null; }
}
function startEngine(){
  const ac = ensureAudio(); if(!ac || engNodes) return;
  // buzzy saw stack + noise = weed-whacker rasp
  const master = ac.createGain(); master.gain.value = 0.0001;
  master.gain.linearRampToValueAtTime(0.06, ac.currentTime+0.18);
  const filt = ac.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value = 1500; filt.Q.value = 2;
  filt.connect(master).connect(ac.destination);
  const o1 = ac.createOscillator(); o1.type='sawtooth'; o1.frequency.value = 110;
  const o2 = ac.createOscillator(); o2.type='square';  o2.frequency.value = 221;
  const g2 = ac.createGain(); g2.gain.value = 0.35;
  const lfo = ac.createOscillator(); lfo.frequency.value = 27;   // pops/putter
  const lfoG = ac.createGain(); lfoG.gain.value = 14;
  lfo.connect(lfoG).connect(o1.frequency);
  o1.connect(filt); o2.connect(g2).connect(filt);
  const nb = ac.createBuffer(1, ac.sampleRate*1, ac.sampleRate);
  const nd = nb.getChannelData(0);
  for(let i=0;i<nd.length;i++) nd[i] = Math.random()*2-1;
  const noise = ac.createBufferSource(); noise.buffer = nb; noise.loop = true;
  const nf = ac.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=3200; nf.Q.value=0.7;
  const ng = ac.createGain(); ng.gain.value = 0.25;
  noise.connect(nf).connect(ng).connect(filt);
  o1.start(); o2.start(); lfo.start(); noise.start();
  engNodes = {master, filt, o1, o2, lfo, noise, baseFreq: 110};
}
function setEngineLoad(load){ // 0 idle .. 1 bogged down in thick grass
  if(!engNodes || !actx) return;
  const t = actx.currentTime;
  // revs drop and get rougher under load
  const f = engNodes.baseFreq * (1.55 - load*0.5);
  engNodes.o1.frequency.setTargetAtTime(f, t, 0.06);
  engNodes.o2.frequency.setTargetAtTime(f*2.01, t, 0.06);
  engNodes.filt.frequency.setTargetAtTime(1500 + load*900, t, 0.08);
  engNodes.master.gain.setTargetAtTime(0.05 + load*0.045, t, 0.08);
}
function stopEngine(){
  if(!engNodes || !actx) return;
  const n = engNodes; engNodes = null;
  try{
    n.master.gain.setTargetAtTime(0.0001, actx.currentTime, 0.07);
    setTimeout(()=>{ try{ n.o1.stop(); n.o2.stop(); n.lfo.stop(); n.noise.stop(); }catch(e){} }, 350);
  }catch(e){}
}

// ---------- cutting ----------
let cutThisFrame = 0;
function cutAt(x, y){
  cutThisFrame = 0;
  const r2 = CUT_RADIUS*CUT_RADIUS;
  for(const b of blades){
    if(b.h <= CUT_TARGET) continue;
    // blade tip position (approx, ignoring sway for hit test)
    const tipY = b.y - b.h;
    // the line cuts anything whose stem passes through the cut circle
    const dx = b.x - x;
    // vertical overlap: cut height = distance from cut center to root
    if(dx*dx > r2) continue;
    const spanTop = Math.max(tipY, y - CUT_RADIUS*0.55);
    if(spanTop > b.y) continue;
    const dyRoot = b.y - y;
    if(dyRoot < -CUT_RADIUS*0.55 || dyRoot > CUT_RADIUS*2.2) continue;
    // new height: cut down to the line's height above the root (min CUT_TARGET)
    let newH = Math.max(b.y - (y + Math.abs(dx)*0.18), CUT_TARGET*0.6);
    newH = Math.max(newH, CUT_TARGET*0.55 + Math.random()*4);
    if(newH < b.h - 2){
      const cutLen = b.h - newH;
      b.h = newH;
      cutThisFrame++;
      if(clippings.length < 260 && Math.random() < 0.55){
        clippings.push({
          x: b.x, y: b.y - newH,
          vx: (Math.random()-0.5)*5 + (Math.random()<0.5?-2.5:2.5),
          vy: -(1.5 + Math.random()*3.5),
          len: Math.min(cutLen, 6 + Math.random()*10),
          rot: Math.random()*Math.PI, vrot: (Math.random()-0.5)*0.6,
          r: b.r, g: b.g, bcol: b.b,
          life: 1, decay: 0.014 + Math.random()*0.012
        });
      }
    }
  }
  // soil dust when line runs near bare ground
  if(cutThisFrame === 0 && trimming && y > groundY()+10 && Math.random()<0.3 && dust.length < 60){
    dust.push({x: x+(Math.random()-0.5)*20, y: y+8, r: 2+Math.random()*4, vx:(Math.random()-0.5)*1.2, vy:-(0.3+Math.random()*0.7), life: 0.6, decay: 0.02});
  }
}

// ---------- drawing ----------
function drawWorld(){
  // sky
  const sky = ctx.createLinearGradient(0,0,0,groundY());
  sky.addColorStop(0,'#8ec8e8'); sky.addColorStop(0.7,'#c8e2ee'); sky.addColorStop(1,'#dcecf0');
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,groundY());

  // distant hedge
  ctx.fillStyle = '#5a8a4a';
  ctx.beginPath();
  ctx.moveTo(0, groundY()-46);
  for(let x=0;x<=W;x+=40){
    ctx.quadraticCurveTo(x+20, groundY()-58-((x*7)%17), x+40, groundY()-46);
  }
  ctx.lineTo(W, groundY()); ctx.lineTo(0, groundY());
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(30,50,25,0.25)';
  ctx.fillRect(0, groundY()-14, W, 14);

  // wooden fence along the edge
  const fy = groundY()-44;
  for(let x=8; x<W; x+=52){
    const grain = ctx.createLinearGradient(x,0,x+34,0);
    grain.addColorStop(0,'#9a7247'); grain.addColorStop(0.5,'#b08655'); grain.addColorStop(1,'#8a6640');
    ctx.fillStyle = grain;
    ctx.fillRect(x, fy, 34, 46);
    ctx.beginPath(); ctx.moveTo(x, fy); ctx.lineTo(x+17, fy-9); ctx.lineTo(x+34, fy); ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(60,40,20,0.35)';
    ctx.fillRect(x+4, fy+6, 2, 34);
    ctx.fillRect(x+26, fy+10, 2, 26);
  }
  ctx.fillStyle = '#7a5a38';
  ctx.fillRect(0, fy+10, W, 6);
  ctx.fillRect(0, fy+30, W, 6);

  // soil strip
  const soil = ctx.createLinearGradient(0,groundY(),0,H);
  soil.addColorStop(0,'#4a3a26'); soil.addColorStop(1,'#2e2418');
  ctx.fillStyle = soil; ctx.fillRect(0, groundY(), W, H-groundY());
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  for(let i=0;i<40;i++){
    const sx = (i*97.3)%W, sy = groundY()+((i*53.7)%(H-groundY()));
    ctx.fillRect(sx, sy, 3+(i%4), 1.6);
  }
}

function drawBlade(b, wind){
  const sway = Math.sin(swayT*1.6 + b.phase) * b.swayAmt * (b.h/b.maxH) + wind;
  const tipX = b.x + (b.lean + sway) * b.h;
  const tipY = b.y - b.h;
  const midX = b.x + (b.lean + sway) * b.h * 0.4;
  const midY = b.y - b.h*0.55;
  const shade = b.h <= CUT_TARGET+2 ? 0.82 : 1;   // cut stubble slightly darker
  ctx.strokeStyle = 'rgb('+Math.round(b.r*shade)+','+Math.round(b.g*shade)+','+Math.round(b.bcol*shade)+')';
  ctx.lineWidth = b.w;
  ctx.beginPath();
  ctx.moveTo(b.x, b.y);
  ctx.quadraticCurveTo(midX, midY, tipX, tipY);
  ctx.stroke();
}

function drawTrimmer(){
  if(mouseX < -100) return;
  ctx.save();
  ctx.translate(headX, headY);
  // shaft up-right toward the "operator"
  const shaftAng = -0.82;
  ctx.save();
  ctx.rotate(shaftAng);
  const shaft = ctx.createLinearGradient(0,0,240,0);
  shaft.addColorStop(0,'#3a3f45'); shaft.addColorStop(1,'#565e66');
  ctx.fillStyle = shaft;
  ctx.fillRect(14, -4, 260, 8);
  // loop handle
  ctx.strokeStyle = '#2e3338'; ctx.lineWidth = 7;
  ctx.beginPath(); ctx.arc(150, -14, 22, Math.PI*0.15, Math.PI*1.1); ctx.stroke();
  ctx.restore();
  // guard
  ctx.fillStyle = '#c8481e';
  ctx.beginPath();
  ctx.ellipse(10, -10, 30, 13, -0.25, Math.PI*0.95, Math.PI*2.05);
  ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(10, -8, 26, 9, -0.25, Math.PI, Math.PI*2);
  ctx.fill();
  // head
  ctx.fillStyle = '#22262a';
  ctx.beginPath(); ctx.ellipse(0, 0, 13, 8, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#3d434a';
  ctx.beginPath(); ctx.ellipse(0, -2, 8, 4.5, 0, 0, Math.PI*2); ctx.fill();
  // spinning line: motion-blur disc when revved
  if(trimming){
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = '#eef2f6';
    ctx.lineWidth = 1.4;
    for(let i=0;i<3;i++){
      ctx.beginPath();
      ctx.ellipse(0, 2, CUT_RADIUS - i*3, (CUT_RADIUS - i*3)*0.32, 0, 0, Math.PI*2);
      ctx.stroke();
    }
    ctx.globalAlpha = 0.14;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.ellipse(0, 2, CUT_RADIUS, CUT_RADIUS*0.32, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }else{
    // idle line tips
    ctx.strokeStyle = '#dfe5ea'; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(-13,2); ctx.lineTo(-CUT_RADIUS*0.8, 6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(13,2); ctx.lineTo(CUT_RADIUS*0.8, -1); ctx.stroke();
  }
  ctx.restore();
}

// ---------- input ----------
function pos(e){
  const rect = canvas.getBoundingClientRect();
  return {x: e.clientX-rect.left, y: e.clientY-rect.top};
}
canvas.addEventListener('pointerdown', (e)=>{
  const p = pos(e); mouseX = p.x; mouseY = p.y;
  trimming = true;
  startEngine();
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', (e)=>{
  const p = pos(e); mouseX = p.x; mouseY = p.y;
});
window.addEventListener('pointerup', ()=>{ trimming = false; stopEngine(); });
canvas.addEventListener('pointerleave', ()=>{ if(!trimming){ mouseX=-200; mouseY=-200; } });

document.getElementById('regrow-btn').onclick = ()=>{ plantGrass(); };
document.getElementById('next-btn').onclick = ()=>{
  edgesDone++;
  const el = document.getElementById('edges-count');
  el.textContent = edgesDone; Unwind.pop(el);
  document.getElementById('celebrate').classList.remove('show');
  plantGrass();
};

// ---------- main loop ----------
let lastTime = performance.now();
let pctFrame = 0;
function loop(now){
  const dt = Unwind.clamp((now-lastTime)/16.67, 0, 3);
  lastTime = now;
  swayT += 0.016*dt;

  // trimmer head eases toward the pointer — feels like a real tool with mass
  if(mouseX > -100){
    if(headX < -100){ headX = mouseX; headY = mouseY; }
    headX = Unwind.lerp(headX, mouseX, Math.min(0.22*dt, 1));
    headY = Unwind.lerp(headY, mouseY, Math.min(0.22*dt, 1));
  }else{ headX = -200; headY = -200; }

  if(trimming && headX > -100){
    cutAt(headX, headY+2);
    setEngineLoad(Unwind.clamp(cutThisFrame/22, 0, 1));
  }

  drawWorld();

  const wind = Math.sin(swayT*0.7)*0.05;
  for(const b of blades) drawBlade(b, wind);

  // clippings
  for(let i=clippings.length-1;i>=0;i--){
    const c = clippings[i];
    c.vy += 0.22*dt;
    c.x += c.vx*dt; c.y += c.vy*dt; c.rot += c.vrot*dt;
    c.vx *= Math.pow(0.985, dt);
    c.life -= c.decay*dt;
    if(c.life <= 0 || c.y > H+10){ clippings.splice(i,1); continue; }
    ctx.save();
    ctx.translate(c.x, c.y); ctx.rotate(c.rot);
    ctx.globalAlpha = Math.max(c.life, 0);
    ctx.strokeStyle = 'rgb('+Math.round(c.r)+','+Math.round(c.g)+','+Math.round(c.bcol)+')';
    ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(-c.len/2,0); ctx.lineTo(c.len/2,0); ctx.stroke();
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  // dust
  for(let i=dust.length-1;i>=0;i--){
    const d = dust[i];
    d.x += d.vx*dt; d.y += d.vy*dt; d.life -= d.decay*dt;
    if(d.life<=0){ dust.splice(i,1); continue; }
    ctx.globalAlpha = d.life*0.5;
    ctx.fillStyle = '#8a755a';
    ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  drawTrimmer();

  // recompute % a few times a second, not every frame
  pctFrame += dt;
  if(pctFrame > 20){ pctFrame = 0; updatePct(); }

  requestAnimationFrame(loop);
}
resize();
window.addEventListener('resize', resize);
requestAnimationFrame(loop);
</script>
</body>
</html>
