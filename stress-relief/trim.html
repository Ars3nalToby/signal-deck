<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trim the Edges — Unwind</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✂️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;1,500&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  body{display:flex; flex-direction:column; align-items:center;}
  .stage{height: 70vh; min-height: 460px; max-height: 660px; cursor:none;}
  .controls{display:flex; gap:12px; justify-content:center; margin-top:18px;}
  .btn{
    background: var(--bg-2); border:1px solid var(--line); color: var(--ink);
    font-family: var(--sans); font-weight:700; font-size:13px;
    padding: 10px 20px; border-radius: 30px; cursor:pointer;
    transition: all .18s ease;
  }
  .btn:hover{border-color: #a8d96a; color:#a8d96a; transform: translateY(-1px);}
  .btn.primary{background: linear-gradient(135deg,#a8d96a,#6ee7d8); color:#15230a; border:none;}
  .btn.primary:hover{transform: translateY(-1px) scale(1.03); color:#15230a;}
</style>
</head>
<body>
<div class="topbar">
  <a class="back" href="index.html">&larr; Back to Unwind</a>
  <div class="title">Trim the Edges</div>
  <div class="right">
    <div class="progress-wrap">
      <span id="pct-label">0% clear</span>
      <div class="progress-bar"><div class="progress-fill" id="pct-fill"></div></div>
    </div>
    <button class="mute-toggle" id="mute-btn">🔊</button>
  </div>
</div>

<div class="counter-row">
  <div class="stat"><div class="num" id="weeds-count">0</div><div class="lbl">Weeds Trimmed</div></div>
</div>

<div class="stage" id="stage">
  <canvas id="c"></canvas>
</div>

<div class="controls">
  <button class="btn primary" id="regrow-btn">Fresh Overgrowth</button>
</div>
<p class="hint">Hold to rev &amp; walk forward. Move the head to sweep the weeds in the cracks ahead of you.</p>

<script src="shared.js"></script>
<script>
// First-person "walking a weedy patio and trimming" scene.
// You hold the trimmer (bottom of frame); holding revs the head AND walks you
// forward, scrolling the paver ground toward you. Sweep the head over the weed
// tufts sprouting in the joints to cut them.

const stageEl = document.getElementById('stage');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR;

Unwind.wireMuteButton(document.getElementById('mute-btn'));

// ---------- config ----------
const WALK_SPEED = 2.6;          // px advanced per frame-unit while holding
const TILE = 300;                // paver texture tile height
const HEAD_R = 30;               // brush-head cut radius (base)
const TUFT_MIN = 26, TUFT_VAR = 34;

// ---------- state ----------
let paverTile;
let tufts = [];
let clippings = [], dust = [], sparks = [];
let mouseX = -300, mouseY = -300;
let headX = -300, headY = -300;
let trimming = false;
let dist = 0;                     // total distance walked (scroll offset)
let spin = 0;                     // brush-head rotation
let swayT = 0, bobPhase = 0;
let weedsTrimmed = 0, nextMilestone = 100;
let clearPct = 0, pctFrame = 0;

function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = stageEl.clientWidth; H = stageEl.clientHeight;
  canvas.width = W*DPR; canvas.height = H*DPR;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  paverTile = bakePavers(W, TILE);
  seedTufts(true);
}

// ---------- depth: near (bottom) big, far (top) small ----------
function depthScale(screenY){
  const t = Unwind.clamp(screenY / H, 0, 1);
  return 0.58 + 0.72 * t;
}

// ---------- baked paver ground (tiles vertically) ----------
function bakePavers(w, tileH){
  const off = document.createElement('canvas');
  off.width = w; off.height = tileH;
  const o = off.getContext('2d');
  const rowH = tileH/2;
  o.fillStyle = '#8f8b80'; o.fillRect(0,0,w,tileH);

  function slab(x,y,sw,sh){
    const tone = 138 + (Math.random()-0.5)*30;
    const g = o.createLinearGradient(x,y,x,y+sh);
    g.addColorStop(0, 'rgb('+(tone+8)+','+(tone+5)+','+(tone-4)+')');
    g.addColorStop(1, 'rgb('+(tone-14)+','+(tone-16)+','+(tone-24)+')');
    o.fillStyle = g; o.fillRect(x+2,y+2,sw-4,sh-4);
    // top-left lit bevel
    o.fillStyle = 'rgba(255,255,255,0.10)'; o.fillRect(x+2,y+2,sw-4,2); o.fillRect(x+2,y+2,2,sh-4);
    // bottom-right dark bevel
    o.fillStyle = 'rgba(0,0,0,0.18)'; o.fillRect(x+2,y+sh-4,sw-4,2); o.fillRect(x+sw-4,y+2,2,sh-4);
  }
  // two brick-laid rows (offset so vertical joints don't line up)
  const cols = 4, sw = w/cols;
  for(let r=0;r<2;r++){
    const yy = r*rowH;
    const offx = r%2 ? -sw/2 : 0;
    for(let cx=offx; cx<w+sw; cx+=sw){ slab(cx, yy, sw, rowH); }
  }
  // fine grit noise
  try{
    const img = o.getImageData(0,0,w,tileH); const d = img.data;
    for(let i=0;i<d.length;i+=4){
      const n = (Math.random()-0.5)*20;
      d[i]=Math.max(0,Math.min(255,d[i]+n));
      d[i+1]=Math.max(0,Math.min(255,d[i+1]+n));
      d[i+2]=Math.max(0,Math.min(255,d[i+2]+n));
    }
    o.putImageData(img,0,0);
  }catch(e){}
  // aggregate flecks + scattered debris
  for(let i=0;i<w*tileH/40;i++){
    const x=Math.random()*w, y=Math.random()*tileH, g=60+Math.random()*80;
    o.fillStyle='rgba('+(g-8)+','+g+','+(g-14)+','+(0.3+Math.random()*0.5)+')';
    o.fillRect(x,y,1,1);
  }
  for(let i=0;i<w/12;i++){
    const x=Math.random()*w, y=Math.random()*tileH;
    o.fillStyle='rgba('+(60+Math.random()*30)+','+(50+Math.random()*24)+','+(30+Math.random()*18)+','+(0.35+Math.random()*0.4)+')';
    o.fillRect(x,y, 1+Math.random()*3, 1+Math.random()*2);
  }
  // joints: darker recessed gaps + mossy tint
  o.strokeStyle='rgba(38,34,28,0.55)'; o.lineWidth=3;
  [0, rowH, tileH].forEach(y=>{ o.beginPath(); o.moveTo(0,y); o.lineTo(w,y); o.stroke(); });
  o.strokeStyle='rgba(70,90,45,0.25)'; o.lineWidth=4;
  [rowH].forEach(y=>{ o.beginPath(); o.moveTo(0,y+0.5); o.lineTo(w,y+0.5); o.stroke(); });
  // vertical joints
  o.strokeStyle='rgba(38,34,28,0.5)'; o.lineWidth=3;
  for(let r=0;r<2;r++){
    const yy=r*rowH, offx = r%2 ? -sw/2 : 0;
    for(let cx=offx; cx<=w+sw; cx+=sw){ o.beginPath(); o.moveTo(cx,yy); o.lineTo(cx,yy+rowH); o.stroke(); }
  }
  return off;
}

// ---------- weed tufts sprouting from joints ----------
function newTuft(worldY){
  const bladeN = 5 + Math.floor(Math.random()*4);
  const gBase = 110 + Math.random()*55;
  const rBase = 55 + Math.random()*40;
  const bBase = 34 + Math.random()*22;
  const blades = [];
  for(let i=0;i<bladeN;i++){
    blades.push({
      ang: (i/(bladeN-1) - 0.5) * (0.9 + Math.random()*0.5) + (Math.random()-0.5)*0.15,
      lenF: 0.7 + Math.random()*0.5,
      curl: (Math.random()-0.5)*0.5,
      w: 1.4 + Math.random()*1.4
    });
  }
  return {
    x: Math.random()*W,
    worldY: worldY,
    size: TUFT_MIN + Math.random()*TUFT_VAR,
    h: 1,                                   // 1 = full, ~0.12 = cut stubble
    phase: Math.random()*Math.PI*2,
    sway: 0.04 + Math.random()*0.06,
    rootCol: 'rgb('+Math.round(rBase*0.6)+','+Math.round(gBase*0.55)+','+Math.round(bBase*0.6)+')',
    midCol:  'rgb('+Math.round(rBase)+','+Math.round(gBase)+','+Math.round(bBase)+')',
    tipCol:  'rgb('+Math.round(rBase+35)+','+Math.round(gBase+40)+','+Math.round(bBase+8)+')',
    blades,
    hasFlower: Math.random() < 0.18,
    fresh: 0
  };
}
function seedTufts(reset){
  if(reset){ tufts = []; dist = 0; }
  const N = Math.floor(W*H/2600);
  const span = H*1.7;
  tufts = [];
  for(let i=0;i<N;i++){
    tufts.push(newTuft(dist - H*0.2 + Math.random()*span));
  }
}
function tuftScreenY(t){ return H - (t.worldY - dist); }

// ---------- audio (2-stroke brush cutter) ----------
let actx, engNodes = null;
function ensureAudio(){
  if(Unwind.isMuted()) return null;
  try{ actx = actx || new (window.AudioContext||window.webkitAudioContext)(); return actx; }
  catch(e){ return null; }
}
function startEngine(){
  const ac = ensureAudio(); if(!ac || engNodes) return;
  const master = ac.createGain(); master.gain.value = 0.0001;
  master.gain.linearRampToValueAtTime(0.065, ac.currentTime+0.18);
  const filt = ac.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value = 1500; filt.Q.value = 2;
  filt.connect(master).connect(ac.destination);
  const o1 = ac.createOscillator(); o1.type='sawtooth'; o1.frequency.value = 118;
  const o2 = ac.createOscillator(); o2.type='square';   o2.frequency.value = 237;
  const g2 = ac.createGain(); g2.gain.value = 0.32;
  const lfo = ac.createOscillator(); lfo.frequency.value = 29;
  const lfoG = ac.createGain(); lfoG.gain.value = 15;
  lfo.connect(lfoG).connect(o1.frequency);
  o1.connect(filt); o2.connect(g2).connect(filt);
  const nb = ac.createBuffer(1, ac.sampleRate, ac.sampleRate);
  const nd = nb.getChannelData(0);
  for(let i=0;i<nd.length;i++) nd[i] = Math.random()*2-1;
  const noise = ac.createBufferSource(); noise.buffer = nb; noise.loop = true;
  const nf = ac.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=3400; nf.Q.value=0.6;
  const ng = ac.createGain(); ng.gain.value = 0.28;
  noise.connect(nf).connect(ng).connect(filt);
  o1.start(); o2.start(); lfo.start(); noise.start();
  engNodes = {master, filt, o1, o2, lfo, noise, baseFreq: 118};
}
function setEngineLoad(load){
  if(!engNodes || !actx) return;
  const t = actx.currentTime;
  const f = engNodes.baseFreq * (1.55 - load*0.5);
  engNodes.o1.frequency.setTargetAtTime(f, t, 0.06);
  engNodes.o2.frequency.setTargetAtTime(f*2.01, t, 0.06);
  engNodes.filt.frequency.setTargetAtTime(1500 + load*900, t, 0.08);
  engNodes.master.gain.setTargetAtTime(0.055 + load*0.045, t, 0.08);
}
function stopEngine(){
  if(!engNodes || !actx) return;
  const n = engNodes; engNodes = null;
  try{
    n.master.gain.setTargetAtTime(0.0001, actx.currentTime, 0.07);
    setTimeout(()=>{ try{ n.o1.stop(); n.o2.stop(); n.lfo.stop(); n.noise.stop(); }catch(e){} }, 350);
  }catch(e){}
}

// ---------- cutting ----------
let cutThisFrame = 0;
function cutSweep(){
  cutThisFrame = 0;
  if(headX < -100) return;
  const scale = depthScale(headY);
  const r = HEAD_R * scale, r2 = r*r;
  for(const t of tufts){
    if(t.h <= 0.14) continue;
    const sy = tuftScreenY(t);
    const dx = t.x - headX, dy = sy - headY;
    if(dx*dx + dy*dy <= r2){
      t.h = 0.12;
      t.fresh = 1;
      cutThisFrame++;
      weedsTrimmed++;
      // fling clippings outward from the head
      const spurt = 3 + Math.floor(Math.random()*3);
      for(let k=0;k<spurt && clippings.length<340;k++){
        const a = Math.atan2(dy, dx) + (Math.random()-0.5)*1.4;
        const sp = 2.5 + Math.random()*5;
        clippings.push({
          x: t.x, y: sy,
          vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 1.5,
          len: (5+Math.random()*10)*scale,
          rot: Math.random()*Math.PI, vrot:(Math.random()-0.5)*0.8,
          color: t.midCol, life: 1, decay: 0.014+Math.random()*0.012
        });
      }
    }
  }
  if(weedsTrimmed >= nextMilestone){
    nextMilestone += 100;
    Unwind.confetti(stageEl, {colors:['#a8d96a','#6ee7d8','#dff2b0','#4a7a2c']});
    const el = document.getElementById('weeds-count'); Unwind.pop(el);
  }
  // engine grinds against stone if sweeping over bare joint
  if(trimming && cutThisFrame === 0 && Math.random()<0.5 && sparks.length<36){
    for(let k=0;k<2;k++){
      const a = -Math.PI/2 + (Math.random()-0.5)*Math.PI*0.9;
      sparks.push({ x: headX+(Math.random()-0.5)*10, y: headY+(Math.random()-0.5)*10,
        vx: Math.cos(a)*(2+Math.random()*3), vy: Math.sin(a)*(2+Math.random()*3),
        life: 0.55, decay: 0.045+Math.random()*0.03, size: 1+Math.random()*1.3 });
    }
  }
}

// ---------- drawing ----------
function drawGround(){
  const off = ((dist % TILE) + TILE) % TILE;
  for(let y = off - TILE; y < H; y += TILE){
    ctx.drawImage(paverTile, 0, y);
  }
  // distance haze toward the top (things ahead are hazier/brighter)
  const haze = ctx.createLinearGradient(0,0,0,H*0.55);
  haze.addColorStop(0,'rgba(196,205,196,0.30)');
  haze.addColorStop(1,'rgba(196,205,196,0)');
  ctx.fillStyle = haze; ctx.fillRect(0,0,W,H*0.55);
  // warm sun from upper-left
  const sun = ctx.createRadialGradient(W*0.28, H*0.1, 0, W*0.28, H*0.1, W*0.9);
  sun.addColorStop(0,'rgba(255,238,180,0.10)'); sun.addColorStop(1,'rgba(255,238,180,0)');
  ctx.fillStyle = sun; ctx.fillRect(0,0,W,H);
  // shadow of the operator (you) creeping in from the bottom
  const me = ctx.createLinearGradient(0,H,0,H*0.7);
  me.addColorStop(0,'rgba(0,0,0,0.22)'); me.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = me; ctx.fillRect(0,H*0.7,W,H*0.3);
}

function drawTuft(t){
  const sy = tuftScreenY(t);
  if(sy < -40 || sy > H+40) return;
  const scale = depthScale(sy);
  const wind = Math.sin(swayT*1.3 + t.phase) * t.sway;
  const rootX = t.x, rootY = sy;
  if(t.h <= 0.14){
    // cut stubble: a few short pale nubs
    ctx.strokeStyle = t.rootCol; ctx.lineWidth = 1.6*scale; ctx.lineCap='round';
    for(let i=0;i<3;i++){
      const bx = rootX + (i-1)*3*scale;
      ctx.beginPath(); ctx.moveTo(bx, rootY); ctx.lineTo(bx+(Math.random()-0.5)*2, rootY - (3+Math.random()*3)*scale); ctx.stroke();
    }
    ctx.fillStyle = 'rgba(214,226,150,0.7)';
    ctx.beginPath(); ctx.arc(rootX, rootY-1, 1.6*scale, 0, Math.PI*2); ctx.fill();
    return;
  }
  const L = t.size * t.h * scale;
  // soft shadow
  if(L > 10){
    ctx.strokeStyle = 'rgba(18,26,12,0.22)'; ctx.lineCap='round';
    for(const bl of t.blades){
      const a = bl.ang + wind;
      const bl_L = L*bl.lenF;
      const tipX = rootX + Math.sin(a)*bl_L + bl.curl*bl_L*0.4 + 2.5;
      const tipY = rootY - Math.cos(a)*bl_L + 2.5;
      ctx.lineWidth = bl.w*scale*1.2;
      ctx.beginPath(); ctx.moveTo(rootX+2.5, rootY+2.5);
      ctx.quadraticCurveTo(rootX + Math.sin(a)*bl_L*0.5 + 2.5, rootY - Math.cos(a)*bl_L*0.5 + 2.5, tipX, tipY);
      ctx.stroke();
    }
  }
  // blades
  for(const bl of t.blades){
    const a = bl.ang + wind;
    const bl_L = L*bl.lenF;
    const midX = rootX + Math.sin(a)*bl_L*0.5 + bl.curl*bl_L*0.2;
    const midY = rootY - Math.cos(a)*bl_L*0.5;
    const tipX = rootX + Math.sin(a)*bl_L + bl.curl*bl_L*0.4;
    const tipY = rootY - Math.cos(a)*bl_L;
    const g = ctx.createLinearGradient(rootX, rootY, tipX, tipY);
    g.addColorStop(0, t.rootCol);
    g.addColorStop(0.5, t.midCol);
    g.addColorStop(1, t.fresh > 0.02 ? 'rgb(214,238,120)' : t.tipCol);
    ctx.strokeStyle = g; ctx.lineWidth = bl.w*scale; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(rootX, rootY); ctx.quadraticCurveTo(midX, midY, tipX, tipY); ctx.stroke();
  }
  if(t.hasFlower){
    ctx.fillStyle = '#f2d84a';
    ctx.beginPath(); ctx.arc(rootX + Math.sin(wind)*L*0.3, rootY - L*0.9, 2.4*scale, 0, Math.PI*2); ctx.fill();
  }
}

function drawTrimmer(){
  if(headX < -100) return;
  const scale = depthScale(headY);
  const pivotX = W*0.5, pivotY = H + 70;      // "you", just off the bottom
  const ang = Math.atan2(headY - pivotY, headX - pivotX);

  // head ground shadow
  ctx.save();
  const shg = ctx.createRadialGradient(headX+4, headY+8, 2, headX+4, headY+8, (HEAD_R+10)*scale);
  shg.addColorStop(0,'rgba(0,0,0,0.34)'); shg.addColorStop(0.6,'rgba(0,0,0,0.16)'); shg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = shg;
  ctx.beginPath(); ctx.ellipse(headX+4, headY+8, (HEAD_R+8)*scale, (HEAD_R+8)*scale*0.55, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // ---- metal shaft from you to the head ----
  ctx.save();
  ctx.translate(pivotX, pivotY);
  ctx.rotate(ang + Math.PI/2);
  const shaftLen = Math.hypot(headX-pivotX, headY-pivotY);
  const shaftW = 11;
  const sg = ctx.createLinearGradient(-shaftW/2,0,shaftW/2,0);
  sg.addColorStop(0,'#7d848c'); sg.addColorStop(0.4,'#c6ccd2'); sg.addColorStop(0.6,'#eef2f6'); sg.addColorStop(1,'#5b626a');
  ctx.fillStyle = sg;
  ctx.fillRect(-shaftW/2, 0, shaftW, shaftLen);
  ctx.restore();

  // ---- green motor/gearbox housing + spinning metal brush head ----
  ctx.save();
  ctx.translate(headX, headY);
  ctx.scale(scale, scale);
  ctx.rotate(ang + Math.PI/2);

  // green angular gearbox housing (sits on the shaft, just behind the head)
  const gh = ctx.createLinearGradient(0, 26, 0, 2);
  gh.addColorStop(0,'#5fa01e'); gh.addColorStop(0.5,'#8ed12f'); gh.addColorStop(1,'#4f8a18');
  ctx.fillStyle = gh;
  ctx.beginPath();
  ctx.moveTo(-16, 30); ctx.lineTo(16, 30); ctx.lineTo(13, 6);
  ctx.lineTo(6, -6); ctx.lineTo(-6, -6); ctx.lineTo(-13, 6); ctx.closePath();
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.moveTo(-13,6); ctx.lineTo(-6,-6); ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.moveTo(16,30); ctx.lineTo(13,6); ctx.lineTo(6,-6); ctx.lineTo(9,28); ctx.closePath(); ctx.fill();
  // bolt collar under the head
  ctx.fillStyle='#2a2e33'; ctx.beginPath(); ctx.arc(0,-6,7,0,Math.PI*2); ctx.fill();

  ctx.restore();

  // ---- brush head: radiating metal flails, spinning ----
  ctx.save();
  ctx.translate(headX, headY);
  ctx.scale(scale, scale);
  // motion-blur disc while revving
  if(trimming){
    const glow = ctx.createRadialGradient(0,0,HEAD_R*0.4,0,0,HEAD_R+3);
    glow.addColorStop(0,'rgba(230,236,242,0.10)');
    glow.addColorStop(0.75,'rgba(210,216,222,0.16)');
    glow.addColorStop(1,'rgba(210,216,222,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(0,0,HEAD_R+2,0,Math.PI*2); ctx.fill();
  }
  ctx.rotate(spin);
  const spokes = 15;
  ctx.strokeStyle = trimming ? 'rgba(200,206,212,0.45)' : '#aeb4ba';
  for(let i=0;i<spokes;i++){
    const a = (i/spokes)*Math.PI*2;
    ctx.save(); ctx.rotate(a);
    ctx.lineWidth = 2.2;
    ctx.beginPath(); ctx.moveTo(0,5); ctx.lineTo(0, HEAD_R); ctx.stroke();
    // frayed wire tip
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(0, HEAD_R); ctx.lineTo(1.6, HEAD_R+3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, HEAD_R); ctx.lineTo(-1.4, HEAD_R+2.5); ctx.stroke();
    ctx.restore();
  }
  // crisper leading spokes so rotation reads even at speed
  if(trimming){
    ctx.strokeStyle = '#e8edf2'; ctx.lineWidth = 2.4;
    for(let i=0;i<3;i++){
      const a = (i/3)*Math.PI*2;
      ctx.save(); ctx.rotate(a);
      ctx.beginPath(); ctx.moveTo(0,5); ctx.lineTo(0, HEAD_R); ctx.stroke();
      ctx.restore();
    }
  }
  // metal hub cap
  const hub = ctx.createRadialGradient(-2,-2,1,0,0,8);
  hub.addColorStop(0,'#f2f5f8'); hub.addColorStop(0.5,'#9aa1a8'); hub.addColorStop(1,'#3d434a');
  ctx.fillStyle = hub;
  ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#20242a'; ctx.beginPath(); ctx.arc(0,0,2.4,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ---------- input ----------
function pos(e){ const r = canvas.getBoundingClientRect(); return {x: e.clientX-r.left, y: e.clientY-r.top}; }
canvas.addEventListener('pointerdown', (e)=>{
  const p = pos(e); mouseX = p.x; mouseY = p.y;
  trimming = true; startEngine();
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', (e)=>{ const p = pos(e); mouseX = p.x; mouseY = p.y; });
window.addEventListener('pointerup', ()=>{ trimming = false; stopEngine(); });
canvas.addEventListener('pointerleave', ()=>{ if(!trimming){ mouseX=-300; mouseY=-300; } });

document.getElementById('regrow-btn').onclick = ()=>{
  for(const t of tufts){ t.h = 1; t.fresh = 0; }
};

function updateClearPct(){
  let vis=0, clear=0;
  for(const t of tufts){
    const sy = tuftScreenY(t);
    if(sy < 0 || sy > H) continue;
    vis++;
    if(t.h <= 0.14) clear++;
  }
  clearPct = vis ? Math.round(clear/vis*100) : 100;
  document.getElementById('pct-label').textContent = clearPct+'% clear';
  document.getElementById('pct-fill').style.width = clearPct+'%';
}

// ---------- main loop ----------
let lastTime = performance.now();
function loop(now){
  const dt = Unwind.clamp((now-lastTime)/16.67, 0, 3);
  lastTime = now;
  swayT += 0.016*dt;

  // head eases toward pointer (tool has mass)
  if(mouseX > -100){
    if(headX < -100){ headX = mouseX; headY = mouseY; }
    headX = Unwind.lerp(headX, mouseX, Math.min(0.25*dt, 1));
    headY = Unwind.lerp(headY, mouseY, Math.min(0.25*dt, 1));
  }else{ headX = -300; headY = -300; }

  // walking forward while revving
  if(trimming){
    dist += WALK_SPEED*dt;
    spin += 0.9*dt;
    bobPhase += 0.22*dt;
    cutSweep();
    setEngineLoad(Unwind.clamp(cutThisFrame/12, 0, 1));
  }else{
    spin += 0.08*dt;
  }

  // recycle tufts that scrolled past you; keep field stocked ahead
  const span = H*1.7;
  for(const t of tufts){
    if(t.fresh > 0) t.fresh = Math.max(0, t.fresh - 0.02*dt);
    if(tuftScreenY(t) > H + 40){
      t.worldY += span; t.x = Math.random()*W; t.h = 1; t.fresh = 0;
      t.size = TUFT_MIN + Math.random()*TUFT_VAR;
    }
  }

  // camera bob (ground moves, hands stay) sells the walk
  const bobX = trimming ? Math.sin(bobPhase)*2.2 : 0;
  const bobY = trimming ? Math.abs(Math.sin(bobPhase))*2.6 : 0;

  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(bobX, bobY);
  drawGround();
  tufts.sort((a,b)=> a.worldY - b.worldY);   // far first
  for(const t of tufts) drawTuft(t);

  // clippings
  for(let i=clippings.length-1;i>=0;i--){
    const c = clippings[i];
    c.vy += 0.22*dt; c.x += c.vx*dt; c.y += c.vy*dt; c.rot += c.vrot*dt;
    c.vx *= Math.pow(0.985, dt); c.life -= c.decay*dt;
    if(c.life<=0 || c.y>H+20){ clippings.splice(i,1); continue; }
    ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rot);
    ctx.globalAlpha = Math.max(c.life,0);
    ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(-c.len/2+1,1.4,c.len,1.5);
    ctx.strokeStyle=c.color; ctx.lineWidth=1.6; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-c.len/2,0); ctx.lineTo(c.len/2,0); ctx.stroke();
    ctx.restore();
  }
  ctx.globalAlpha=1;

  // dust + sparks
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i]; s.vy+=0.28*dt; s.x+=s.vx*dt; s.y+=s.vy*dt; s.life-=s.decay*dt;
    if(s.life<=0){ sparks.splice(i,1); continue; }
    ctx.globalAlpha=Math.max(s.life,0);
    ctx.fillStyle='#fff3c8'; ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,150,60,0.7)'; ctx.beginPath(); ctx.arc(s.x,s.y,s.size*1.8,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  ctx.restore();   // end bob

  drawTrimmer();

  document.getElementById('weeds-count').textContent = weedsTrimmed;
  pctFrame += dt;
  if(pctFrame > 12){ pctFrame = 0; updateClearPct(); }

  requestAnimationFrame(loop);
}
resize();
window.addEventListener('resize', resize);
requestAnimationFrame(loop);
</script>
</body>
